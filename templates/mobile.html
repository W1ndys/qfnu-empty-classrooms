<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>空教室查询</title>
    <!-- Vant CSS -->
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css">
    <style>
        :root {
            /* 主色 - 曲奇棕 */
            --primary-color: #885021;
            --primary-color-light: #8B5A2B;
            --primary-color-dark: #5D3615;
            --primary-color-opacity-10: rgba(118, 69, 28, 0.1);
            --primary-color-opacity-5: rgba(118, 69, 28, 0.05);

            /* 辅助色 */
            --cream-color: #F5E6D3;
            --caramel-color: #C4956A;

            /* 语义色 */
            --success-color: #34C759;
            --warning-color: #FF9500;
            --danger-color: #FF3B30;
            --info-color: #007AFF;

            /* 中性色 */
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --bg-primary: #F2F2F7;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #E5E5EA;

            /* 间距 */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-xxl: 24px;

            /* 圆角 */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;

            /* 阴影 */
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);

            /* 动画 */
            --duration-fast: 150ms;
            --duration-normal: 250ms;
            --duration-slow: 350ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            min-height: 100vh;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* 导航栏 */
        .nav-bar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--bg-tertiary);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-bar :deep(.van-nav-bar__title) {
            font-weight: 600;
            font-size: 17px;
            color: var(--text-primary);
        }

        /* 页面内容 */
        .page-content {
            padding: var(--spacing-lg);
        }

        /* 日期信息卡片 */
        .date-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            margin-bottom: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
        }

        .date-card__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
        }

        .date-card__title {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .date-card__weekday {
            font-size: 15px;
            color: var(--primary-color);
            font-weight: 500;
            background: var(--primary-color-opacity-10);
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-full);
        }

        .date-card__info {
            display: flex;
            gap: var(--spacing-lg);
            color: var(--text-secondary);
            font-size: 13px;
        }

        .date-card__info-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        /* 教学楼选择 */
        .building-tabs {
            margin-bottom: var(--spacing-lg);
        }

        .building-tabs :deep(.van-tabs__nav) {
            background: transparent;
        }

        .building-tabs :deep(.van-tab) {
            color: var(--text-secondary);
            font-size: 15px;
        }

        .building-tabs :deep(.van-tab--active) {
            color: var(--primary-color);
            font-weight: 600;
        }

        .building-tabs :deep(.van-tabs__line) {
            background: var(--primary-color);
            height: 3px;
            border-radius: 2px;
        }

        /* 时间段卡片 */
        .time-slot-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .time-slot-card:active {
            transform: scale(0.98);
            transition: transform var(--duration-fast) ease-out;
        }

        .time-slot-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-lg);
            border-bottom: 0.5px solid var(--bg-tertiary);
        }

        .time-slot-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .time-slot-count {
            font-size: 13px;
            color: var(--bg-secondary);
            background: var(--primary-color);
            padding: 2px 10px;
            border-radius: var(--radius-full);
            font-weight: 500;
        }

        .time-slot-count--empty {
            background: var(--text-tertiary);
        }

        .time-slot-body {
            padding: var(--spacing-lg);
        }

        .classroom-grid {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
        }

        .classroom-tag {
            font-size: 13px;
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-sm);
            background: var(--primary-color-opacity-10);
            color: var(--primary-color);
            font-weight: 500;
            transition: all var(--duration-fast) ease-out;
        }

        .classroom-tag:active {
            background: var(--primary-color);
            color: white;
        }

        .empty-tip {
            color: var(--text-tertiary);
            font-size: 13px;
            text-align: center;
            padding: var(--spacing-md) 0;
        }

        /* 加载状态 */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px var(--spacing-lg);
        }

        .loading-text {
            margin-top: var(--spacing-lg);
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* 错误状态 */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px var(--spacing-lg);
            text-align: center;
        }

        .error-icon {
            font-size: 48px;
            color: var(--danger-color);
            margin-bottom: var(--spacing-lg);
        }

        .error-text {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: var(--spacing-xl);
            line-height: 1.5;
        }

        /* 刷新按钮 */
        .refresh-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            padding: var(--spacing-md) var(--spacing-xxl);
            font-size: 15px;
            font-weight: 600;
        }

        .refresh-btn:active {
            background: var(--primary-color-dark);
            transform: scale(0.98);
        }

        /* 底部信息 */
        .footer-info {
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-lg);
            color: var(--text-tertiary);
            font-size: 11px;
        }

        /* 下拉刷新 */
        .van-pull-refresh {
            min-height: calc(100vh - 46px);
        }

        /* 折叠面板样式 */
        .time-slot-collapse :deep(.van-collapse-item__title) {
            padding: var(--spacing-lg);
        }

        .time-slot-collapse :deep(.van-collapse-item__content) {
            padding: 0 var(--spacing-lg) var(--spacing-lg);
        }

        .time-slot-collapse :deep(.van-cell::after) {
            display: none;
        }

        /* Vant 主题覆盖 */
        :root {
            --van-primary-color: #885021;
            --van-loading-spinner-color: #885021;
            --van-pull-refresh-loading-icon-color: #885021;
            --van-tabs-bottom-bar-color: #885021;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 导航栏 -->
        <van-nav-bar
            title="空教室查询"
            class="nav-bar"
            :border="false"
        >
            <template #right>
                <van-icon
                    name="replay"
                    size="20"
                    :color="refreshing ? '#C7C7CC' : '#885021'"
                    @click="handleRefresh"
                />
            </template>
        </van-nav-bar>

        <!-- 下拉刷新 -->
        <van-pull-refresh
            v-model="refreshing"
            @refresh="onRefresh"
            :pulling-text="'下拉刷新数据'"
            :loosing-text="'释放立即刷新'"
            :loading-text="'正在刷新...'"
            success-text="刷新成功"
        >
            <!-- 加载状态 -->
            <div v-if="loading && !data" class="loading-container">
                <van-loading type="spinner" color="#885021" size="36" />
                <div class="loading-text">正在加载空教室数据...</div>
            </div>

            <!-- 错误状态 -->
            <div v-else-if="error && !data" class="error-container">
                <van-icon name="warning-o" class="error-icon" />
                <div class="error-text">{{ error }}</div>
                <button class="refresh-btn" @click="fetchData">重新加载</button>
            </div>

            <!-- 数据展示 -->
            <div v-else-if="data" class="page-content">
                <!-- 日期信息卡片 -->
                <div class="date-card">
                    <div class="date-card__header">
                        <div class="date-card__title">{{ data.date }}</div>
                        <div class="date-card__weekday">周{{ data.weekday_name }}</div>
                    </div>
                    <div class="date-card__info">
                        <div class="date-card__info-item">
                            <van-icon name="calendar-o" />
                            <span>第{{ data.week }}周</span>
                        </div>
                        <div class="date-card__info-item">
                            <van-icon name="clock-o" />
                            <span>{{ data.query_time }}</span>
                        </div>
                    </div>
                </div>

                <!-- 教学楼选择 -->
                <van-tabs
                    v-model:active="activeBuilding"
                    class="building-tabs"
                    :ellipsis="false"
                    shrink
                >
                    <van-tab
                        v-for="building in data.buildings"
                        :key="building.name"
                        :title="building.name"
                    >
                        <!-- 时间段列表 -->
                        <van-collapse v-model="activeSlots" accordion>
                            <van-collapse-item
                                v-for="slot in timeSlots"
                                :key="slot.key"
                                :name="slot.key"
                                class="time-slot-card"
                            >
                                <template #title>
                                    <div class="time-slot-header" style="border: none; padding: 0;">
                                        <span class="time-slot-title">{{ slot.name }}</span>
                                        <span
                                            class="time-slot-count"
                                            :class="{ 'time-slot-count--empty': getClassrooms(building, slot.key).length === 0 }"
                                        >
                                            {{ getClassrooms(building, slot.key).length }} 间
                                        </span>
                                    </div>
                                </template>
                                <div class="classroom-grid" v-if="getClassrooms(building, slot.key).length > 0">
                                    <span
                                        v-for="room in getClassrooms(building, slot.key)"
                                        :key="room"
                                        class="classroom-tag"
                                    >
                                        {{ formatRoomName(room, building.name) }}
                                    </span>
                                </div>
                                <div v-else class="empty-tip">该时段暂无空教室</div>
                            </van-collapse-item>
                        </van-collapse>
                    </van-tab>
                </van-tabs>

                <!-- 底部信息 -->
                <div class="footer-info">
                    数据来源：曲阜师范大学教务系统<br>
                    更新时间：{{ data.query_time }}
                </div>
            </div>
        </van-pull-refresh>
    </div>

    <!-- Vue 3 -->
    <script src="https://fastly.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <!-- Vant -->
    <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>

    <script>
        const { createApp, ref, computed, onMounted } = Vue;

        const app = createApp({
            setup() {
                const loading = ref(false);
                const refreshing = ref(false);
                const error = ref(null);
                const data = ref(null);
                const activeBuilding = ref(0);
                const activeSlots = ref('slot_1_2');

                const timeSlots = [
                    { key: 'slot_1_2', name: '第1-2节' },
                    { key: 'slot_3_4', name: '第3-4节' },
                    { key: 'slot_5_6', name: '第5-6节' },
                    { key: 'slot_7_8', name: '第7-8节' },
                    { key: 'slot_9_11', name: '第9-11节' }
                ];

                const fetchData = async () => {
                    loading.value = true;
                    error.value = null;

                    try {
                        const response = await fetch('/api/classrooms');
                        const result = await response.json();

                        if (result.code === 0) {
                            data.value = result.data;
                        } else {
                            error.value = result.message || '获取数据失败';
                        }
                    } catch (e) {
                        error.value = '网络错误，请检查网络连接';
                    } finally {
                        loading.value = false;
                    }
                };

                const refreshData = async () => {
                    try {
                        const response = await fetch('/api/refresh');
                        const result = await response.json();

                        if (result.code === 0) {
                            data.value = result.data;
                            vant.showToast({
                                message: '刷新成功',
                                icon: 'success'
                            });
                        } else {
                            vant.showToast({
                                message: result.message || '刷新失败',
                                icon: 'fail'
                            });
                        }
                    } catch (e) {
                        vant.showToast({
                            message: '网络错误',
                            icon: 'fail'
                        });
                    }
                };

                const onRefresh = async () => {
                    await refreshData();
                    refreshing.value = false;
                };

                const handleRefresh = () => {
                    if (refreshing.value) return;
                    refreshing.value = true;
                    onRefresh();
                };

                const getClassrooms = (building, slotKey) => {
                    return building[slotKey] || [];
                };

                const formatRoomName = (room, buildingName) => {
                    // 移除教学楼前缀，只显示教室号
                    if (room.startsWith(buildingName)) {
                        return room.substring(buildingName.length);
                    }
                    return room;
                };

                onMounted(() => {
                    fetchData();
                });

                return {
                    loading,
                    refreshing,
                    error,
                    data,
                    activeBuilding,
                    activeSlots,
                    timeSlots,
                    fetchData,
                    onRefresh,
                    handleRefresh,
                    getClassrooms,
                    formatRoomName
                };
            }
        });

        app.use(vant);
        app.mount('#app');
    </script>
</body>
</html>
