<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管理员登录 - 空教室查询系统</title>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="/static/css/element-plus.css" />
    <style>
        :root {
            --primary-color: #885021;
            --primary-color-light: #a06830;
            --bg-color: #f5f7fa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-header h1 {
            font-size: 24px;
            color: #303133;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #909399;
            font-size: 14px;
        }

        .login-form {
            margin-bottom: 20px;
        }

        .form-item {
            margin-bottom: 20px;
        }

        .form-item label {
            display: block;
            margin-bottom: 8px;
            color: #606266;
            font-size: 14px;
        }

        .form-item .el-input {
            width: 100%;
        }

        .login-btn {
            width: 100%;
            height: 44px;
            font-size: 16px;
            background: var(--primary-color);
            border-color: var(--primary-color);
        }

        .login-btn:hover {
            background: var(--primary-color-light);
            border-color: var(--primary-color-light);
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #909399;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            color: var(--primary-color);
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <h1>管理员登录</h1>
                    <p>空教室查询系统后台管理</p>
                </div>

                <el-form class="login-form" @submit.prevent="handleLogin">
                    <div class="form-item">
                        <label>管理员密码</label>
                        <el-input v-model="password" type="password" placeholder="请输入管理员密码"
                            show-password size="large" @keyup.enter="handleLogin"></el-input>
                    </div>

                    <el-button type="primary" class="login-btn" :loading="loading" @click="handleLogin">
                        {{ loading ? '登录中...' : '登 录' }}
                    </el-button>
                </el-form>

                <div class="back-link">
                    <a href="/">返回首页</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Vue 3 -->
    <script src="/static/js/vue.global.prod.js"></script>
    <!-- Element Plus -->
    <script src="/static/js/element-plus.js"></script>

    <script>
        const { createApp, ref } = Vue;

        const app = createApp({
            setup() {
                const password = ref('');
                const loading = ref(false);

                const handleLogin = async () => {
                    if (!password.value) {
                        ElementPlus.ElMessage.warning('请输入密码');
                        return;
                    }

                    loading.value = true;

                    try {
                        const response = await fetch('/admin/api/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ password: password.value })
                        });

                        const data = await response.json();

                        if (data.code === 0) {
                            ElementPlus.ElMessage.success('登录成功');
                            setTimeout(() => {
                                window.location.href = '/admin/';
                            }, 500);
                        } else {
                            ElementPlus.ElMessage.error(data.message || '登录失败');
                        }
                    } catch (e) {
                        ElementPlus.ElMessage.error('网络错误，请稍后重试');
                    } finally {
                        loading.value = false;
                    }
                };

                return {
                    password,
                    loading,
                    handleLogin
                };
            }
        });

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>

</html>
