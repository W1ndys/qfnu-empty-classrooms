<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>管理员登录 - 空教室查询系统</title>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="/static/css/element-plus.css" />
    <style>
        :root {
            /* 主色 - 曲奇棕 */
            --primary-color: #885021;
            --primary-color-light: #8B5A2B;
            --primary-color-dark: #5D3615;
            --primary-color-opacity-10: rgba(118, 69, 28, 0.1);
            --primary-color-opacity-5: rgba(118, 69, 28, 0.05);

            /* 辅助色 */
            --cream-color: #F5E6D3;
            --caramel-color: #C4956A;

            /* 语义色 */
            --success-color: #34C759;
            --warning-color: #FF9500;
            --danger-color: #FF3B30;
            --info-color: #007AFF;

            /* 中性色 */
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --bg-primary: #F2F2F7;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #E5E5EA;

            /* 间距 */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-xxl: 24px;

            /* 圆角 */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;

            /* 阴影 */
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);

            /* 动画 */
            --duration-fast: 150ms;
            --duration-normal: 250ms;
            --duration-slow: 350ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-color-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            width: 100%;
            padding: var(--spacing-lg);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto;
        }

        .login-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xxl) var(--spacing-xxl) var(--spacing-xl);
            box-shadow: var(--shadow-lg);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-xxl);
        }

        .admin-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-color-dark) 100%);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-lg);
            box-shadow: 0 4px 16px rgba(136, 80, 33, 0.3);
        }

        .admin-icon svg {
            width: 40px;
            height: 40px;
            fill: #fff;
        }

        .login-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
            line-height: 1.3;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.5;
        }

        .login-form {
            margin-bottom: var(--spacing-xl);
        }

        .form-item {
            margin-bottom: var(--spacing-xl);
        }

        .form-item label {
            display: block;
            margin-bottom: var(--spacing-sm);
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 500;
        }

        .form-item .el-input {
            --el-input-border-radius: var(--radius-md);
        }

        .form-item .el-input__wrapper {
            padding: var(--spacing-md) var(--spacing-lg);
            box-shadow: 0 0 0 1px var(--bg-tertiary) inset;
            transition: all var(--duration-fast) ease-out;
        }

        .form-item .el-input__wrapper:hover {
            box-shadow: 0 0 0 1px var(--caramel-color) inset;
        }

        .form-item .el-input__wrapper.is-focus {
            box-shadow: 0 0 0 2px var(--primary-color) inset;
        }

        .login-btn {
            width: 100%;
            height: 48px;
            font-size: 16px;
            font-weight: 600;
            background: var(--primary-color) !important;
            border-color: var(--primary-color) !important;
            border-radius: var(--radius-md) !important;
            transition: all var(--duration-fast) ease-out;
        }

        .login-btn:hover {
            background: var(--primary-color-light) !important;
            border-color: var(--primary-color-light) !important;
        }

        .login-btn:active {
            background: var(--primary-color-dark) !important;
            border-color: var(--primary-color-dark) !important;
            transform: scale(0.98);
        }

        .login-footer {
            text-align: center;
            padding-top: var(--spacing-lg);
            border-top: 1px solid var(--bg-tertiary);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color var(--duration-fast) ease-out;
        }

        .back-link:hover {
            color: var(--primary-color);
        }

        .back-link svg {
            width: 16px;
            height: 16px;
            margin-right: var(--spacing-xs);
            fill: currentColor;
        }

        /* Element Plus 主题覆盖 */
        :root {
            --el-color-primary: #885021;
            --el-color-primary-light-3: #A67C52;
            --el-color-primary-light-5: #C4956A;
            --el-color-primary-light-7: #DFC4A8;
            --el-color-primary-light-9: #F5E6D3;
            --el-color-primary-dark-2: #5D3615;
        }

        /* 页面背景装饰 */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow: hidden;
            pointer-events: none;
            z-index: -1;
        }

        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
        }

        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -30%;
            right: -30%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(0, 0, 0, 0.1) 0%, transparent 50%);
        }

        /* 版权信息 */
        .copyright {
            text-align: center;
            margin-top: var(--spacing-xxl);
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
        }

        .copyright a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
        }

        .copyright a:hover {
            color: #fff;
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="bg-decoration"></div>

    <div id="app">
        <div class="login-container">
            <div class="login-card">
                <div class="login-header">
                    <div class="admin-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/>
                        </svg>
                    </div>
                    <h1>管理员登录</h1>
                    <p>空教室查询系统后台管理</p>
                </div>

                <div class="login-form">
                    <div class="form-item">
                        <label>管理员密码</label>
                        <el-input
                            v-model="password"
                            type="password"
                            placeholder="请输入管理员密码"
                            show-password
                            size="large"
                            @keyup.enter="handleLogin"
                            :prefix-icon="Lock"
                        />
                    </div>

                    <el-button
                        type="primary"
                        class="login-btn"
                        :loading="loading"
                        @click="handleLogin"
                    >
                        {{ loading ? '登录中...' : '登 录' }}
                    </el-button>
                </div>

                <div class="login-footer">
                    <a href="/" class="back-link">
                        <svg viewBox="0 0 24 24">
                            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                        </svg>
                        返回首页
                    </a>
                </div>
            </div>

            <div class="copyright">
                <span>空教室查询系统</span>
            </div>
        </div>
    </div>

    <!-- Vue 3 -->
    <script src="/static/js/vue.global.prod.js"></script>
    <!-- Element Plus -->
    <script src="/static/js/element-plus.js"></script>
    <!-- Element Plus Icons -->
    <script src="/static/js/element-plus-icons.js"></script>

    <script>
        const { createApp, ref, shallowRef } = Vue;

        const app = createApp({
            setup() {
                const password = ref('');
                const loading = ref(false);
                const Lock = shallowRef(ElementPlusIconsVue.Lock);

                const handleLogin = async () => {
                    if (!password.value) {
                        ElementPlus.ElMessage.warning('请输入密码');
                        return;
                    }

                    loading.value = true;

                    try {
                        const response = await fetch('/admin/api/login', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ password: password.value })
                        });

                        const data = await response.json();

                        if (data.code === 0) {
                            ElementPlus.ElMessage.success('登录成功');
                            setTimeout(() => {
                                window.location.href = '/admin/';
                            }, 500);
                        } else {
                            ElementPlus.ElMessage.error(data.message || '登录失败');
                        }
                    } catch (e) {
                        ElementPlus.ElMessage.error('网络错误，请稍后重试');
                    } finally {
                        loading.value = false;
                    }
                };

                return {
                    password,
                    loading,
                    handleLogin,
                    Lock
                };
            }
        });

        app.use(ElementPlus);
        // 注册图标
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }
        app.mount('#app');
    </script>
</body>

</html>
