<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>空教室查询 - 曲阜师范大学</title>
    <!-- Element Plus CSS -->
    <link rel="stylesheet" href="https://unpkg.com/element-plus/dist/index.css">
    <!-- Element Plus Icons -->
    <link rel="stylesheet" href="https://unpkg.com/@element-plus/icons-vue">
    <style>
        :root {
            /* 主色 - 曲奇棕 */
            --primary-color: #885021;
            --primary-color-light: #8B5A2B;
            --primary-color-dark: #5D3615;
            --primary-color-opacity-10: rgba(118, 69, 28, 0.1);
            --primary-color-opacity-5: rgba(118, 69, 28, 0.05);

            /* 辅助色 */
            --cream-color: #F5E6D3;
            --caramel-color: #C4956A;

            /* 语义色 */
            --success-color: #34C759;
            --warning-color: #FF9500;
            --danger-color: #FF3B30;
            --info-color: #007AFF;

            /* 中性色 */
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --bg-primary: #F2F2F7;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #E5E5EA;

            /* 间距 */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-xxl: 24px;

            /* 圆角 */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;

            /* 阴影 */
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 24px rgba(0,0,0,0.12);

            /* 动画 */
            --duration-fast: 150ms;
            --duration-normal: 250ms;
            --duration-slow: 350ms;

            /* Element Plus 主题覆盖 */
            --el-color-primary: #885021;
            --el-color-primary-light-3: #A67C52;
            --el-color-primary-light-5: #C4956A;
            --el-color-primary-light-7: #F5E6D3;
            --el-color-primary-light-9: rgba(118, 69, 28, 0.1);
            --el-color-primary-dark-2: #5D3615;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部导航 */
        .header {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid var(--bg-tertiary);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 0 var(--spacing-xxl);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: var(--primary-color);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        /* 主内容区 */
        .main-content {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: var(--spacing-xxl);
            width: 100%;
        }

        /* 日期信息卡片 */
        .date-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xxl);
            margin-bottom: var(--spacing-xl);
            box-shadow: var(--shadow-sm);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .date-card__left {
            display: flex;
            align-items: center;
            gap: var(--spacing-xl);
        }

        .date-card__main {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .date-card__title {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .date-card__subtitle {
            font-size: 15px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: var(--spacing-lg);
        }

        .date-card__subtitle-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .date-card__weekday {
            font-size: 15px;
            color: var(--primary-color);
            font-weight: 500;
            background: var(--primary-color-opacity-10);
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: var(--radius-full);
        }

        /* 内容布局 */
        .content-layout {
            display: grid;
            grid-template-columns: 200px 1fr;
            gap: var(--spacing-xl);
        }

        /* 侧边栏 - 教学楼列表 */
        .sidebar {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            box-shadow: var(--shadow-sm);
            height: fit-content;
            position: sticky;
            top: 80px;
        }

        .sidebar-title {
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
            padding: var(--spacing-sm) var(--spacing-md);
            margin-bottom: var(--spacing-sm);
        }

        .building-list {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .building-item {
            padding: var(--spacing-md) var(--spacing-lg);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--duration-fast) ease-out;
            font-size: 15px;
            color: var(--text-primary);
        }

        .building-item:hover {
            background: var(--primary-color-opacity-5);
        }

        .building-item.active {
            background: var(--primary-color-opacity-10);
            color: var(--primary-color);
            font-weight: 600;
        }

        /* 主内容 - 时间段列表 */
        .main-panel {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-lg);
        }

        .time-slot-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            transition: box-shadow var(--duration-normal) ease-out;
        }

        .time-slot-card:hover {
            box-shadow: var(--shadow-md);
        }

        .time-slot-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-lg) var(--spacing-xl);
            border-bottom: 0.5px solid var(--bg-tertiary);
            cursor: pointer;
            user-select: none;
        }

        .time-slot-header:hover {
            background: var(--primary-color-opacity-5);
        }

        .time-slot-left {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .time-slot-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-color-opacity-10);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
            font-size: 18px;
        }

        .time-slot-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .time-slot-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .time-slot-time {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .time-slot-right {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
        }

        .time-slot-count {
            font-size: 14px;
            color: var(--bg-secondary);
            background: var(--primary-color);
            padding: var(--spacing-xs) var(--spacing-md);
            border-radius: var(--radius-full);
            font-weight: 500;
        }

        .time-slot-count--empty {
            background: var(--text-tertiary);
        }

        .time-slot-arrow {
            color: var(--text-tertiary);
            transition: transform var(--duration-fast) ease-out;
        }

        .time-slot-arrow.expanded {
            transform: rotate(180deg);
        }

        .time-slot-body {
            padding: var(--spacing-xl);
            background: var(--primary-color-opacity-5);
        }

        .classroom-grid {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
        }

        .classroom-tag {
            font-size: 14px;
            padding: var(--spacing-sm) var(--spacing-lg);
            border-radius: var(--radius-sm);
            background: var(--bg-secondary);
            color: var(--primary-color);
            font-weight: 500;
            border: 1px solid var(--primary-color-opacity-10);
            transition: all var(--duration-fast) ease-out;
            cursor: default;
        }

        .classroom-tag:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .empty-tip {
            color: var(--text-tertiary);
            font-size: 14px;
            text-align: center;
            padding: var(--spacing-xl) 0;
        }

        /* 加载状态 */
        .loading-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px var(--spacing-lg);
        }

        .loading-text {
            margin-top: var(--spacing-lg);
            color: var(--text-secondary);
            font-size: 15px;
        }

        /* 错误状态 */
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px var(--spacing-lg);
            text-align: center;
        }

        .error-icon {
            font-size: 64px;
            color: var(--danger-color);
            margin-bottom: var(--spacing-xl);
        }

        .error-text {
            color: var(--text-secondary);
            font-size: 16px;
            margin-bottom: var(--spacing-xxl);
            line-height: 1.6;
        }

        /* 底部信息 */
        .footer {
            text-align: center;
            padding: var(--spacing-xxl) var(--spacing-lg);
            color: var(--text-tertiary);
            font-size: 13px;
            border-top: 0.5px solid var(--bg-tertiary);
            background: var(--bg-secondary);
        }

        .footer-links {
            margin-top: var(--spacing-sm);
        }

        .footer-links a {
            color: var(--primary-color);
            text-decoration: none;
            margin: 0 var(--spacing-sm);
        }

        .footer-links a:hover {
            text-decoration: underline;
        }

        /* Element Plus 样式覆盖 */
        .el-button--primary {
            --el-button-bg-color: var(--primary-color);
            --el-button-border-color: var(--primary-color);
            --el-button-hover-bg-color: var(--primary-color-light);
            --el-button-hover-border-color: var(--primary-color-light);
            --el-button-active-bg-color: var(--primary-color-dark);
            --el-button-active-border-color: var(--primary-color-dark);
        }

        .el-button--primary.is-plain {
            --el-button-text-color: var(--primary-color);
            --el-button-bg-color: var(--primary-color-opacity-10);
            --el-button-border-color: transparent;
            --el-button-hover-text-color: var(--primary-color);
            --el-button-hover-bg-color: var(--primary-color-opacity-10);
            --el-button-hover-border-color: var(--primary-color);
        }

        .el-loading-spinner .circular {
            stroke: var(--primary-color) !important;
        }

        /* 响应式适配 */
        @media (max-width: 900px) {
            .content-layout {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: static;
            }

            .building-list {
                flex-direction: row;
                flex-wrap: wrap;
            }

            .building-item {
                flex: none;
            }

            .main-content {
                padding: var(--spacing-lg);
            }

            .date-card {
                flex-direction: column;
                align-items: flex-start;
                gap: var(--spacing-lg);
            }

            .date-card__left {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        /* 折叠过渡动画 */
        .collapse-enter-active,
        .collapse-leave-active {
            transition: all var(--duration-normal) ease-out;
            overflow: hidden;
        }

        .collapse-enter-from,
        .collapse-leave-to {
            opacity: 0;
            max-height: 0;
            padding-top: 0;
            padding-bottom: 0;
        }

        .collapse-enter-to,
        .collapse-leave-from {
            opacity: 1;
            max-height: 500px;
        }
    </style>
</head>
<body>
    <div id="app" v-cloak>
        <!-- 顶部导航 -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <div class="logo-icon">
                        <el-icon><school /></el-icon>
                    </div>
                    <span class="logo-text">曲阜师范大学 · 空教室查询</span>
                </div>
                <div class="header-actions">
                    <el-button
                        type="primary"
                        plain
                        :loading="refreshing"
                        @click="handleRefresh"
                    >
                        <el-icon v-if="!refreshing"><refresh /></el-icon>
                        {{ refreshing ? '刷新中...' : '刷新数据' }}
                    </el-button>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 加载状态 -->
            <div v-if="loading && !data" class="loading-container">
                <el-icon class="is-loading" :size="48" color="#885021">
                    <loading />
                </el-icon>
                <div class="loading-text">正在加载空教室数据...</div>
            </div>

            <!-- 错误状态 -->
            <div v-else-if="error && !data" class="error-container">
                <el-icon :size="64" color="#FF3B30">
                    <warning-filled />
                </el-icon>
                <div class="error-text">{{ error }}</div>
                <el-button type="primary" size="large" @click="fetchData">
                    重新加载
                </el-button>
            </div>

            <!-- 数据展示 -->
            <template v-else-if="data">
                <!-- 日期信息卡片 -->
                <div class="date-card">
                    <div class="date-card__left">
                        <div class="date-card__main">
                            <div class="date-card__title">{{ data.date }}</div>
                            <div class="date-card__subtitle">
                                <span class="date-card__subtitle-item">
                                    <el-icon><calendar /></el-icon>
                                    第{{ data.week }}周
                                </span>
                                <span class="date-card__subtitle-item">
                                    <el-icon><clock /></el-icon>
                                    更新于 {{ data.query_time }}
                                </span>
                            </div>
                        </div>
                        <div class="date-card__weekday">周{{ data.weekday_name }}</div>
                    </div>
                </div>

                <!-- 内容布局 -->
                <div class="content-layout">
                    <!-- 侧边栏 - 教学楼列表 -->
                    <aside class="sidebar">
                        <div class="sidebar-title">教学楼</div>
                        <div class="building-list">
                            <div
                                v-for="(building, index) in data.buildings"
                                :key="building.name"
                                class="building-item"
                                :class="{ active: activeBuilding === index }"
                                @click="activeBuilding = index"
                            >
                                {{ building.name }}
                            </div>
                        </div>
                    </aside>

                    <!-- 主内容 - 时间段列表 -->
                    <div class="main-panel">
                        <div
                            v-for="slot in timeSlots"
                            :key="slot.key"
                            class="time-slot-card"
                        >
                            <div
                                class="time-slot-header"
                                @click="toggleSlot(slot.key)"
                            >
                                <div class="time-slot-left">
                                    <div class="time-slot-icon">
                                        <el-icon><timer /></el-icon>
                                    </div>
                                    <div class="time-slot-info">
                                        <div class="time-slot-title">{{ slot.name }}</div>
                                        <div class="time-slot-time">{{ slot.time }}</div>
                                    </div>
                                </div>
                                <div class="time-slot-right">
                                    <span
                                        class="time-slot-count"
                                        :class="{ 'time-slot-count--empty': getClassrooms(slot.key).length === 0 }"
                                    >
                                        {{ getClassrooms(slot.key).length }} 间空教室
                                    </span>
                                    <el-icon
                                        class="time-slot-arrow"
                                        :class="{ expanded: expandedSlots.includes(slot.key) }"
                                    >
                                        <arrow-down />
                                    </el-icon>
                                </div>
                            </div>
                            <transition name="collapse">
                                <div
                                    v-if="expandedSlots.includes(slot.key)"
                                    class="time-slot-body"
                                >
                                    <div
                                        v-if="getClassrooms(slot.key).length > 0"
                                        class="classroom-grid"
                                    >
                                        <span
                                            v-for="room in getClassrooms(slot.key)"
                                            :key="room"
                                            class="classroom-tag"
                                        >
                                            {{ formatRoomName(room) }}
                                        </span>
                                    </div>
                                    <div v-else class="empty-tip">
                                        该时段暂无空教室
                                    </div>
                                </div>
                            </transition>
                        </div>
                    </div>
                </div>
            </template>
        </main>

        <!-- 底部信息 -->
        <footer class="footer" v-if="data">
            <div>数据来源：曲阜师范大学教务系统</div>
            <div class="footer-links">
                <a href="/mobile">移动端版本</a>
            </div>
        </footer>
    </div>

    <!-- Vue 3 -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <!-- Element Plus -->
    <script src="https://unpkg.com/element-plus"></script>
    <!-- Element Plus Icons -->
    <script src="https://unpkg.com/@element-plus/icons-vue"></script>

    <script>
        const { createApp, ref, computed, onMounted, watch } = Vue;

        const app = createApp({
            setup() {
                const loading = ref(false);
                const refreshing = ref(false);
                const error = ref(null);
                const data = ref(null);
                const activeBuilding = ref(0);
                const expandedSlots = ref(['slot_1_2']);

                const timeSlots = [
                    { key: 'slot_1_2', name: '第1-2节', time: '08:00 - 09:40' },
                    { key: 'slot_3_4', name: '第3-4节', time: '10:00 - 11:40' },
                    { key: 'slot_5_6', name: '第5-6节', time: '14:00 - 15:40' },
                    { key: 'slot_7_8', name: '第7-8节', time: '16:00 - 17:40' },
                    { key: 'slot_9_11', name: '第9-11节', time: '19:00 - 21:30' }
                ];

                const currentBuilding = computed(() => {
                    if (!data.value || !data.value.buildings) return null;
                    return data.value.buildings[activeBuilding.value];
                });

                const fetchData = async () => {
                    loading.value = true;
                    error.value = null;

                    try {
                        const response = await fetch('/api/classrooms');
                        const result = await response.json();

                        if (result.code === 0) {
                            data.value = result.data;
                        } else {
                            error.value = result.message || '获取数据失败';
                        }
                    } catch (e) {
                        error.value = '网络错误，请检查网络连接';
                    } finally {
                        loading.value = false;
                    }
                };

                const refreshData = async () => {
                    refreshing.value = true;
                    try {
                        const response = await fetch('/api/refresh');
                        const result = await response.json();

                        if (result.code === 0) {
                            data.value = result.data;
                            ElementPlus.ElMessage.success('数据刷新成功');
                        } else {
                            ElementPlus.ElMessage.error(result.message || '刷新失败');
                        }
                    } catch (e) {
                        ElementPlus.ElMessage.error('网络错误');
                    } finally {
                        refreshing.value = false;
                    }
                };

                const handleRefresh = () => {
                    if (refreshing.value) return;
                    refreshData();
                };

                const getClassrooms = (slotKey) => {
                    if (!currentBuilding.value) return [];
                    return currentBuilding.value[slotKey] || [];
                };

                const formatRoomName = (room) => {
                    if (!currentBuilding.value) return room;
                    const buildingName = currentBuilding.value.name;
                    if (room.startsWith(buildingName)) {
                        return room.substring(buildingName.length);
                    }
                    return room;
                };

                const toggleSlot = (slotKey) => {
                    const index = expandedSlots.value.indexOf(slotKey);
                    if (index > -1) {
                        expandedSlots.value.splice(index, 1);
                    } else {
                        expandedSlots.value.push(slotKey);
                    }
                };

                onMounted(() => {
                    fetchData();
                });

                return {
                    loading,
                    refreshing,
                    error,
                    data,
                    activeBuilding,
                    expandedSlots,
                    timeSlots,
                    currentBuilding,
                    fetchData,
                    handleRefresh,
                    getClassrooms,
                    formatRoomName,
                    toggleSlot
                };
            }
        });

        // 注册 Element Plus 图标
        for (const [key, component] of Object.entries(ElementPlusIconsVue)) {
            app.component(key, component);
        }

        app.use(ElementPlus);
        app.mount('#app');
    </script>
</body>
</html>
