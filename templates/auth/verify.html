<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>访问验证 - 空教室查询系统</title>
    <!-- Vant CSS -->
    <link rel="stylesheet" href="/static/css/vant.css" />
    <style>
        :root {
            /* 主色 - 曲奇棕 */
            --primary-color: #885021;
            --primary-color-light: #8B5A2B;
            --primary-color-dark: #5D3615;
            --primary-color-opacity-10: rgba(118, 69, 28, 0.1);
            --primary-color-opacity-5: rgba(118, 69, 28, 0.05);

            /* 辅助色 */
            --cream-color: #F5E6D3;
            --caramel-color: #C4956A;

            /* 语义色 */
            --success-color: #34C759;
            --warning-color: #FF9500;
            --danger-color: #FF3B30;
            --info-color: #007AFF;

            /* 中性色 */
            --text-primary: #1C1C1E;
            --text-secondary: #8E8E93;
            --text-tertiary: #C7C7CC;
            --bg-primary: #F2F2F7;
            --bg-secondary: #FFFFFF;
            --bg-tertiary: #E5E5EA;

            /* 间距 */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 12px;
            --spacing-lg: 16px;
            --spacing-xl: 20px;
            --spacing-xxl: 24px;

            /* 圆角 */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --radius-full: 9999px;

            /* 阴影 */
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);

            /* 动画 */
            --duration-fast: 150ms;
            --duration-normal: 250ms;
            --duration-slow: 350ms;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", "PingFang SC", sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        #app {
            width: 100%;
            padding: var(--spacing-lg);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .verify-container {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
        }

        .verify-card {
            background: var(--bg-secondary);
            border-radius: var(--radius-xl);
            padding: var(--spacing-xxl);
            box-shadow: var(--shadow-md);
        }

        .verify-header {
            text-align: center;
            margin-bottom: var(--spacing-xxl);
        }

        .lock-icon {
            width: 72px;
            height: 72px;
            background: var(--primary-color-opacity-10);
            border-radius: var(--radius-full);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--spacing-lg);
        }

        .lock-icon svg {
            width: 36px;
            height: 36px;
            fill: var(--primary-color);
        }

        .verify-header h1 {
            font-size: 22px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: var(--spacing-sm);
            line-height: 1.3;
        }

        .verify-header p {
            color: var(--text-secondary);
            font-size: 15px;
            line-height: 1.5;
        }

        .verify-form {
            margin-bottom: var(--spacing-lg);
        }

        .form-item {
            margin-bottom: var(--spacing-xl);
        }

        .form-item .van-field {
            background: var(--bg-primary);
            border-radius: var(--radius-md);
        }

        .form-item .van-cell {
            padding: var(--spacing-md) var(--spacing-lg);
        }

        .verify-btn {
            width: 100%;
            height: 48px;
            background: var(--primary-color) !important;
            border: none !important;
            border-radius: var(--radius-md) !important;
            font-size: 16px;
            font-weight: 600;
            transition: all var(--duration-fast) ease-out;
        }

        .verify-btn:active {
            background: var(--primary-color-dark) !important;
            transform: scale(0.98);
        }

        .footer-info {
            text-align: center;
            margin-top: var(--spacing-xxl);
            color: var(--text-tertiary);
            font-size: 13px;
            line-height: 1.4;
        }

        .footer-info a {
            color: var(--primary-color);
            text-decoration: none;
            font-weight: 500;
        }

        .footer-info a:active {
            opacity: 0.7;
        }

        /* Vant 主题覆盖 */
        :root {
            --van-primary-color: #885021;
            --van-loading-spinner-color: #885021;
            --van-button-primary-background: #885021;
            --van-button-primary-border-color: #885021;
        }
    </style>
</head>

<body>
    <div id="app">
        <div class="verify-container">
            <div class="verify-card">
                <div class="verify-header">
                    <div class="lock-icon">
                        <svg viewBox="0 0 24 24">
                            <path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                    </div>
                    <h1>访问验证</h1>
                    <p>请输入访问密码以继续使用</p>
                </div>

                <div class="verify-form">
                    <div class="form-item">
                        <van-field
                            v-model="password"
                            type="password"
                            placeholder="请输入访问密码"
                            :border="false"
                            size="large"
                            left-icon="lock"
                            @keyup.enter="handleVerify"
                        />
                    </div>

                    <van-button
                        type="primary"
                        class="verify-btn"
                        :loading="loading"
                        loading-text="验证中..."
                        @click="handleVerify"
                    >
                        验 证
                    </van-button>
                </div>

                <div class="footer-info">
                    <span>如需获取密码，请联系管理员</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Vue 3 -->
    <script src="/static/js/vue.global.prod.js"></script>
    <!-- Vant -->
    <script src="/static/js/vant.min.js"></script>

    <script>
        const { createApp, ref } = Vue;

        const app = createApp({
            setup() {
                const password = ref('');
                const loading = ref(false);

                const handleVerify = async () => {
                    if (!password.value) {
                        vant.showToast('请输入密码');
                        return;
                    }

                    loading.value = true;

                    try {
                        const response = await fetch('/auth/api/verify', {
                            method: 'POST',
                            headers: {
                                'Content-Type': 'application/json'
                            },
                            body: JSON.stringify({ password: password.value })
                        });

                        const data = await response.json();

                        if (data.code === 0) {
                            vant.showSuccessToast('验证成功');
                            setTimeout(() => {
                                window.location.href = '/';
                            }, 500);
                        } else {
                            vant.showFailToast(data.message || '验证失败');
                        }
                    } catch (e) {
                        vant.showFailToast('网络错误，请稍后重试');
                    } finally {
                        loading.value = false;
                    }
                };

                return {
                    password,
                    loading,
                    handleVerify
                };
            }
        });

        app.use(vant);
        app.mount('#app');
    </script>
</body>

</html>
